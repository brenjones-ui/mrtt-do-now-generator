<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#dff5f7">
  <title>MRTT Do Now Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Noto+Music&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #193c57;
      --muted: #54748a;
      --paper: #f7fcfc;
      --stage: #dff5f7;
      --three: #ff9296;
      --two: #ffbd95;
      --one: #ddffb9;
      --accent: #7135ff;
      --white: #fff;
      --shadow: 0 12px 34px rgba(25, 60, 87, .14);
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: #eef7f8; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(150deg, #eefafa 0%, #f8fbfb 58%, #edf1ff 100%);
      font-family: "Lexend", Arial, sans-serif;
    }

    button, select { font: inherit; }
    button { cursor: pointer; }

    .app { width: min(1500px, 100%); margin: 0 auto; padding: 18px; }
    .stage {
      position: relative;
      min-height: min(76vh, 900px);
      padding: 22px 28px 26px 106px;
      overflow: hidden;
      background: var(--stage);
      border: 3px solid var(--accent);
      box-shadow: var(--shadow);
    }

    .brand {
      position: absolute;
      top: 23px;
      left: 12px;
      display: block;
      width: 88px;
      height: auto;
    }
    .side-title {
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translate(-43%, -40%) rotate(-90deg);
      white-space: nowrap;
      color: #6f8fa2;
      font-size: clamp(2rem, 4vw, 4rem);
      font-weight: 600;
      letter-spacing: .13em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: auto minmax(210px, 1fr) minmax(210px, 1fr);
      gap: 18px 36px;
      min-height: calc(min(76vh, 900px) - 52px);
    }
    .points {
      margin: 0;
      text-align: center;
      font-size: clamp(1.35rem, 2.5vw, 2.45rem);
      font-weight: 400;
      letter-spacing: .08em;
    }

    .card {
      position: relative;
      display: grid;
      width: 100%;
      min-height: 210px;
      padding: 28px;
      place-items: center;
      color: #112f43;
      border: 3px solid var(--ink);
      border-radius: 0;
      box-shadow: 0 5px 0 rgba(25, 60, 87, .1);
      text-align: center;
      font-size: clamp(1.05rem, 1.65vw, 1.75rem);
      line-height: 1.35;
      overflow: hidden;
      transition: transform .16s ease, box-shadow .16s ease, filter .16s ease;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 9px 0 rgba(25,60,87,.12); }
    .card:focus-visible { outline: 5px solid var(--accent); outline-offset: 4px; }
    .card[data-points="3"] { background: var(--three); }
    .card[data-points="2"] { background: var(--two); }
    .card[data-points="1"] { background: var(--one); }
    .card.revealed { filter: saturate(.55) brightness(1.07); }
    .card .card-content {
      display: flex;
      width: 100%;
      min-height: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .card .label {
      display: block;
      max-width: 100%;
    }
    .card .symbol {
      display: flex;
      width: 100%;
      height: 84px;
      flex: 0 0 84px;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: "Noto Music", "Segoe UI Symbol", sans-serif;
      font-size: clamp(2.2rem, 3.2vw, 3.25rem);
      line-height: 1;
    }
    .card .symbol:empty { display: none; }
    .card .symbol.symbol--text {
      font-family: "Lexend", Arial, sans-serif;
      font-size: clamp(1.5rem, 2.2vw, 2.15rem);
      font-style: italic;
      letter-spacing: .04em;
    }
    .card .hint {
      position: absolute;
      right: 12px;
      bottom: 9px;
      color: rgba(17, 47, 67, .6);
      font-size: .67rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0;
      justify-content: flex-end;
    }
    .action {
      min-height: 44px;
      padding: 10px 16px;
      color: var(--ink);
      background: var(--white);
      border: 2px solid var(--ink);
      border-radius: 10px;
      font-weight: 600;
    }
    .action.primary { color: white; background: var(--ink); }
    .action:hover { transform: translateY(-1px); }
    .action:focus-visible, select:focus-visible { outline: 4px solid var(--accent); outline-offset: 2px; }

    .controls {
      padding: 22px;
      background: rgba(255,255,255,.88);
      border: 1px solid #cadfe5;
      border-radius: 16px;
      box-shadow: var(--shadow);
    }
    .controls h2 { margin: 0 0 5px; font-size: 1.3rem; }
    .controls p { margin: 0 0 18px; color: var(--muted); }
    .filters { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 15px; }
    label { display: grid; gap: 7px; font-size: .85rem; font-weight: 700; }
    select {
      width: 100%;
      min-height: 48px;
      padding: 8px 12px;
      color: var(--ink);
      background: white;
      border: 2px solid #9bb8c5;
      border-radius: 9px;
    }
    .status { min-height: 1.3em; margin: 14px 0 0 !important; font-size: .85rem; }

    .stage:fullscreen { width: 100vw; min-height: 100vh; border-width: 0; }
    .stage:fullscreen .grid { min-height: calc(100vh - 48px); }

    @media (max-width: 850px) {
      .app { padding: 8px; }
      .stage { padding: 18px; }
      .brand, .side-title { display: none; }
      .grid { gap: 10px; }
      .card { padding: 15px; }
      .filters { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      .grid { grid-template-columns: 1fr; grid-template-rows: none; }
      .points { display: none; }
      .card { min-height: 150px; }
      .card::before {
        content: attr(data-points) " points";
        position: absolute;
        top: 8px;
        left: 10px;
        font-size: .7rem;
        font-weight: 700;
        text-transform: uppercase;
      }
    }
  </style>
</head>

dEVYdGV4aWY6WUNiQ3JQb3NpdGlvbmluZwAxrA+AYwAAAABJRU5ErkJggg==" alt="Music Ready to Teach">
      <div class="side-title">DO NOW</div>

      <div class="grid" id="questionGrid">
        <h2 class="points">3 Points</h2>
        <h2 class="points">2 Points</h2>
        <h2 class="points">1 Point</h2>
      </div>
    </section>

    <div class="toolbar" aria-label="Display controls">
      <button class="action" id="revealAll" type="button">Reveal all</button>
      <button class="action" id="resetAnswers" type="button">Hide answers</button>
      <button class="action" id="fullscreen" type="button">Full screen</button>
      <button class="action primary" id="generate" type="button">Generate new set</button>
    </div>

    <section class="controls" aria-labelledby="configureTitle">
      <h2 id="configureTitle">Configure your Do Now</h2>
      <p>Choose a year, unit or topic, then generate six retrieval questions.</p>
      <div class="filters">
        <label>Year group
          <select id="yearFilter"><option value="all">All year groups</option></select>
        </label>
        <label>Unit
          <select id="unitFilter"><option value="all">All units</option></select>
        </label>
        <label>Topic
          <select id="topicFilter"><option value="all">All topics</option></select>
        </label>
      </div>
      <p class="status" id="status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-bUOkaoVxeQZZfr76mXIM-ozMSdKwVzF4FAl80Kg8M0lBDbl9nfHd74jgGi5-qLrYvWiTsk0g8GqY/pub?gid=0&single=true&output=csv";

    // These questions remain available if a school network blocks the live sheet.
    const fallbackQuestions = [
      {id:"KM01",year:"Year 7",unit:"Keys and Melodies",topic:"Keyboard",points:1,question:"What pattern do the black keys form?",answer:"They form repeating groups of two and three."},
      {id:"KM02",year:"Year 7",unit:"Keys and Melodies",topic:"Keyboard",points:1,question:"In which direction does pitch get higher on a keyboard?",answer:"Pitch gets higher as you move to the right."},
      {id:"KM03",year:"Year 7",unit:"Keys and Melodies",topic:"Pitch",points:1,question:"What does pitch describe?",answer:"How high or low a sound is."},
      {id:"KM04",year:"Year 7",unit:"Keys and Melodies",topic:"Melody",points:1,question:"What is a melody?",answer:"A sequence of notes that forms a musical idea."},
      {id:"KM05",year:"Year 7",unit:"Keys and Melodies",topic:"Keyboard",points:2,question:"Explain how to find a C on the keyboard.",answer:"Find a group of two black keys. C is the white key immediately to their left."},
      {id:"KM06",year:"Year 7",unit:"Keys and Melodies",topic:"Pitch",points:2,question:"Describe the difference between a high and a low pitch.",answer:"A high pitch sounds higher and has a faster frequency. A low pitch sounds deeper and has a slower frequency."},
      {id:"KM07",year:"Year 7",unit:"Keys and Melodies",topic:"Melody",points:2,question:"Describe stepwise movement in a melody.",answer:"The melody moves between neighbouring notes without skipping pitches."},
      {id:"KM08",year:"Year 7",unit:"Keys and Melodies",topic:"Melody",points:2,question:"What is the difference between ascending and descending?",answer:"Ascending moves higher in pitch. Descending moves lower in pitch."},
      {id:"KM09",year:"Year 7",unit:"Keys and Melodies",topic:"Keyboard",points:3,question:"A pupil cannot find F. Explain how they can locate it using the black keys.",answer:"Find a group of three black keys. F is the white key immediately to the left of the group."},
      {id:"KM10",year:"Year 7",unit:"Keys and Melodies",topic:"Melody",points:3,question:"Explain how stepwise movement and leaps create contrasting melodies.",answer:"Stepwise movement uses neighbouring notes and sounds smooth. Leaps skip notes and create larger changes in pitch."},
      {id:"KM11",year:"Year 7",unit:"Keys and Melodies",topic:"Pitch",points:3,question:"A melody moves from C to G and then down to E. Describe its pitch movement.",answer:"It first ascends in a leap from C to G, then descends from G to E."},
      {id:"KM12",year:"Year 7",unit:"Keys and Melodies",topic:"Keyboard",points:3,question:"Explain why the black-key pattern helps musicians navigate the keyboard.",answer:"The repeating groups of two and three create landmarks that help musicians locate every named white key."}
    ];
    let questions = [...fallbackQuestions];

    const grid = document.querySelector("#questionGrid");
    const status = document.querySelector("#status");
    const filters = {
      year: document.querySelector("#yearFilter"),
      unit: document.querySelector("#unitFilter"),
      topic: document.querySelector("#topicFilter")
    };

    const shuffle = list => [...list].sort(() => Math.random() - 0.5);
    const unique = (key, pool = questions) => [...new Set(pool.map(item => item[key]))].sort();

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let value = "";
      let quoted = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (char === '"' && quoted && next === '"') {
          value += '"';
          i += 1;
        } else if (char === '"') {
          quoted = !quoted;
        } else if (char === "," && !quoted) {
          row.push(value);
          value = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(value);
          if (row.some(cell => cell !== "")) rows.push(row);
          row = [];
          value = "";
        } else {
          value += char;
        }
      }
      row.push(value);
      if (row.some(cell => cell !== "")) rows.push(row);
      return rows;
    }

    async function loadQuestionBank() {
      const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
      if (!response.ok) throw new Error(`Question feed returned ${response.status}`);
      const rows = parseCSV(await response.text());
      const headers = rows.shift().map(header => header.trim());
      const value = (row, name) => row[headers.indexOf(name)]?.trim() || "";
      const loaded = rows.map(row => ({
        id: value(row, "ID"),
        year: value(row, "Year Group"),
        unit: value(row, "Unit"),
        topic: value(row, "Topic"),
        firstLesson: Number(value(row, "First Retrieval Lesson")) || 1,
        points: Number(value(row, "Points")),
        question: value(row, "Question"),
        answer: value(row, "Answer"),
        status: value(row, "Status"),
        promptType: value(row, "Prompt Type") || "Text",
        symbol: value(row, "Symbol / Media"),
        accessiblePrompt: value(row, "Accessible Prompt")
      })).filter(item => item.id && item.question && item.answer && item.status === "Live" && [1, 2, 3].includes(item.points));

      if (loaded.length < 6) throw new Error("The published question feed is empty or incomplete.");
      questions = loaded;
    }

    function addOptions(select, values) {
      select.querySelectorAll("option:not(:first-child)").forEach(option => option.remove());
      values.forEach(value => select.add(new Option(value, value)));
    }

    function currentPool() {
      return questions.filter(item =>
        (filters.year.value === "all" || item.year === filters.year.value) &&
        (filters.unit.value === "all" || item.unit === filters.unit.value) &&
        (filters.topic.value === "all" || item.topic === filters.topic.value)
      );
    }

    function refreshDependentFilters() {
      const yearPool = questions.filter(item => filters.year.value === "all" || item.year === filters.year.value);
      const oldUnit = filters.unit.value;
      addOptions(filters.unit, unique("unit", yearPool));
      filters.unit.value = [...filters.unit.options].some(option => option.value === oldUnit) ? oldUnit : "all";

      const unitPool = yearPool.filter(item => filters.unit.value === "all" || item.unit === filters.unit.value);
      const oldTopic = filters.topic.value;
      addOptions(filters.topic, unique("topic", unitPool));
      filters.topic.value = [...filters.topic.options].some(option => option.value === oldTopic) ? oldTopic : "all";
    }

    function createCard(item) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "card";
      button.dataset.points = item.points;
      button.dataset.question = item.question;
      button.dataset.answer = item.answer;
      button.dataset.symbol = item.symbol || "";
      button.dataset.revealed = "false";
      button.dataset.accessiblePrompt = item.accessiblePrompt || item.question;
      button.setAttribute("aria-label", `${item.points} point question: ${button.dataset.accessiblePrompt}. Click to reveal the answer.`);
      button.innerHTML = `<span class="card-content"><span class="label"></span><span class="symbol" aria-hidden="true"></span></span><span class="hint">Click to reveal</span>`;
      button.querySelector(".label").textContent = item.question;
      const symbol = button.querySelector(".symbol");
      symbol.textContent = item.symbol || "";
      symbol.classList.toggle("symbol--text", /[A-Za-z0-9]/.test(item.symbol || ""));
      button.addEventListener("click", () => setRevealed(button, button.dataset.revealed !== "true"));
      return button;
    }

    function setRevealed(card, reveal) {
      card.dataset.revealed = String(reveal);
      card.classList.toggle("revealed", reveal);
      card.querySelector(".label").textContent = reveal ? card.dataset.answer : card.dataset.question;
      card.querySelector(".hint").textContent = reveal ? "Answer • click to hide" : "Click to reveal";
      card.setAttribute("aria-label", reveal ? `Answer: ${card.dataset.answer}. Click to show the question.` : `${card.dataset.points} point question: ${card.dataset.accessiblePrompt}. Click to reveal the answer.`);
    }

    function generate() {
      const pool = currentPool();
      const selected = {};
      const missing = [];
      [3, 2, 1].forEach(points => {
        selected[points] = shuffle(pool.filter(item => item.points === points)).slice(0, 2);
        if (selected[points].length < 2) missing.push(`${points}-point`);
      });

      if (missing.length) {
        status.textContent = `This selection needs at least two ${missing.join(", ")} questions. Choose a broader filter.`;
        return;
      }

      grid.querySelectorAll(".card").forEach(card => card.remove());
      const ordered = [selected[3][0], selected[2][0], selected[1][0], selected[3][1], selected[2][1], selected[1][1]];
      ordered.forEach(item => grid.appendChild(createCard(item)));
      status.textContent = `New set generated from ${pool.length} available questions.`;
    }

    filters.year.addEventListener("change", () => { refreshDependentFilters(); generate(); });
    filters.unit.addEventListener("change", () => { refreshDependentFilters(); generate(); });
    filters.topic.addEventListener("change", generate);
    document.querySelector("#generate").addEventListener("click", generate);
    document.querySelector("#revealAll").addEventListener("click", () => grid.querySelectorAll(".card").forEach(card => setRevealed(card, true)));
    document.querySelector("#resetAnswers").addEventListener("click", () => grid.querySelectorAll(".card").forEach(card => setRevealed(card, false)));
    document.querySelector("#fullscreen").addEventListener("click", async () => {
      const stage = document.querySelector("#stage");
      try {
        if (!document.fullscreenElement) await stage.requestFullscreen();
        else await document.exitFullscreen();
      } catch {
        status.textContent = "Full screen was blocked by the browser. Try opening the generator in its own tab.";
      }
    });
    document.addEventListener("fullscreenchange", () => {
      document.querySelector("#fullscreen").textContent = document.fullscreenElement ? "Exit full screen" : "Full screen";
    });

    async function initialise() {
      status.textContent = "Loading the live MRTT question bank…";
      try {
        await loadQuestionBank();
        status.textContent = `${questions.length} live questions loaded.`;
      } catch (error) {
        console.warn(error);
        status.textContent = "The live bank was unavailable, so the built-in starter questions have been loaded.";
      }
      addOptions(filters.year, unique("year"));
      refreshDependentFilters();
      generate();
    }

    initialise();
  </script>
